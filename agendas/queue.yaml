items:
- agenda_id: right-to-repair-agricultural-machinery-consultation-2026
  status: prepared
  title: Enhancing Australia's first right to repair laws - agricultural machinery
    and MVIS improvements
  evaluation_mode: proposed
  jurisdiction: federal
  as_of_date: 2026-06-16
  summary: 'Treasury is consulting on proposals to expand Australia''s Motor Vehicle
    Service and Repair Information Sharing Scheme to certain agricultural machinery
    and to improve the existing motor-vehicle right to repair scheme. The discussion
    paper seeks feedback on machinery and equipment coverage, eligible access to repair
    information, use limits for scheme information, safety and security information,
    intermediaries, electronic logbooks, pricing, supply timeframes, governance, and
    enforcement. The consultation opened on 22 May 2026 and closes on 3 July 2026.

    '
  source_urls:
  - https://consult.treasury.gov.au/c2026-760808
  - https://storage.googleapis.com/files-au-treasury/treasury/p/prj3c8735784e10eec0231f0/page/c2026_760808.pdf
  - https://treasury.gov.au/review/review-motor-vehicle-information-sharing-scheme
  - https://treasury.gov.au/publication/p2026-740225
  - https://ministers.treasury.gov.au/ministers/andrew-leigh-2025/media-releases/right-repair-delivering-motorists-small-business-and
  - https://ministers.treasury.gov.au/ministers/jim-chalmers-2022/media-releases/treasurers-agree-reforms-increase-competition-and-boost
  tags:
  - right-to-repair
  - agriculture
  - competition
  - consumer-policy
  - consultation
  notes:
  - Focus the review on the proposed agricultural machinery extension and the targeted
    improvements to the existing Motor Vehicle Service and Repair Information Sharing
    Scheme.
  - Treat the Treasury discussion paper as consultation material, not final legislation
    or settled policy design.
  - Separate competition, productivity, consumer-choice, farmer downtime, safety,
    cybersecurity, intellectual-property, pricing, and regulatory-burden claims.
  policy_id: enhancing-australia-s-first-right-to-repair-laws-agricultural-machinery-and-mvis-improvements
  policy_dir: policies/proposed/enhancing-australia-s-first-right-to-repair-laws-agricultural-machinery-and-mvis-improvements
  run_dir: runs/enhancing-australia-s-first-right-to-repair-laws-agricultural-machinery-and-mvis-improvements/enhancing-australia-s-first-right-to-repair-laws-agricultural-machinery-and-mvis-improvements__20260615T170138Z
  manual_batch_dir: manual_batches/2026-06-15__enhancing-australia-s-first-right-to-repair-laws-agricultural-machinery-and-mvis-improvements
  prepared_at_utc: '2026-06-15T17:01:38Z'
- agenda_id: drone-security-consultation-2026
  status: prepared
  title: Drone Security Public Consultation Paper 2026 - aerial drone security reforms
  evaluation_mode: proposed
  jurisdiction: federal
  as_of_date: 2026-05-21
  summary: 'The Department of Home Affairs is consulting on proposed Australian Government
    reforms to address drone security risks, with an initial focus on aerial drones.
    The consultation canvasses measures including a national policy framework for
    drone threats, authorised counter-drone capabilities, identification and tracking
    through electronic conspicuity, enforcement settings, operating restrictions for
    higher-risk areas, and public and industry awareness. The consultation is open
    until 12:00PM AEST on 25 May 2026.

    '
  source_urls:
  - https://www.homeaffairs.gov.au/help-and-support/how-to-engage-us/consultations/consultation-on-proposed-approaches-to-australia-drone-security
  - https://www.homeaffairs.gov.au/forms-subsite/files/drone-security-consultation-paper-2026.pdf
  - https://www.infrastructure.gov.au/department/media/news/consultation-opens-drone-security
  - https://minister.homeaffairs.gov.au/TonyBurke/Pages/consultation-opens-on-drone-security-reforms.aspx
  - https://www.infrastructure.gov.au/infrastructure-transport-vehicles/aviation/aviation-white-paper
  tags:
  - drones
  - national-security
  - aviation
  - consultation
  - critical-infrastructure
  notes:
  - Focus the review on proposed aerial drone security reforms and their interaction
    with existing aviation safety and operational frameworks.
  - Treat privacy, noise, and land or maritime drones as adjacent issues unless they
    directly affect the proposed initial aerial-drone framework.
  - Primary source collection should distinguish consultation proposals from settled
    law or government decisions.
  policy_id: drone-security-public-consultation-paper-2026-aerial-drone-security-reforms
  policy_dir: policies/proposed/drone-security-public-consultation-paper-2026-aerial-drone-security-reforms
  run_dir: runs/drone-security-public-consultation-paper-2026-aerial-drone-security-reforms/drone-security-public-consultation-paper-2026-aerial-drone-security-reforms__20260520T170040Z
  manual_batch_dir: manual_batches/2026-05-20__drone-security-public-consultation-paper-2026-aerial-drone-security-reforms
  prepared_at_utc: '2026-05-20T17:00:40Z'
- agenda_id: domestic-gas-reservation-scheme-draft-design-framework-2026
  status: prepared
  title: Domestic Gas Reservation Scheme draft Design Framework
  evaluation_mode: proposed
  jurisdiction: federal
  as_of_date: 2026-06-08
  summary: 'The Australian Government is consulting on a draft Design Framework for
    a Domestic Gas Reservation Scheme. The proposal would require LNG exporters to
    supply gas to the Australian domestic market equivalent to 20 per cent of their
    LNG exports each year, described as a domestic supply obligation, with obligations
    intended to commence from 1 July 2027. The framework also canvasses regulatory
    architecture, export approvals, compliance and enforcement arrangements, flexibility
    mechanisms, and related gas market transparency and conduct reforms. Submissions
    are invited until 11:30pm AEST on 30 June 2026.

    '
  source_urls:
  - https://consult.dcceew.gov.au/domestic-gas-reservation-scheme-draft-design-framework
  - https://www.dcceew.gov.au/about/news/have-your-say-domestic-gas-reservation-scheme
  - https://storage.googleapis.com/files-au-climate/climate-au/p/prj3ce30473c51fb474d08e6/page/Domestic_Gas_Reservation_scheme_draft_Design_Framework_May2026.pdf
  - https://storage.googleapis.com/files-au-climate/climate-au/p/prj3ce30473c51fb474d08e6/page/Domestic_Gas_Reservation_draft_Design_Framework_Attachment_A_Export_Process_and_Flexibility_Mechanisms.pdf
  - https://storage.googleapis.com/files-au-climate/climate-au/p/prj3ce30473c51fb474d08e6/page/DGR_Draft_Design_Framework_Att_B_Increased_Transparency_Measures.pdf
  tags:
  - energy
  - gas
  - lng
  - consultation
  - market-regulation
  notes:
  - Focus the review on the proposed national domestic gas reservation design, including
    the domestic supply obligation, export approval model, compliance settings, and
    market-transparency reforms.
  - Treat the draft Design Framework as indicative consultation material, not settled
    legislation or final policy settings.
  - Separate claims about domestic supply, affordability, industry competitiveness,
    export-contract treatment, and regulatory burden.
  policy_id: domestic-gas-reservation-scheme-draft-design-framework
  policy_dir: policies/proposed/domestic-gas-reservation-scheme-draft-design-framework
  run_dir: runs/domestic-gas-reservation-scheme-draft-design-framework/domestic-gas-reservation-scheme-draft-design-framework__20260607T170055Z
  manual_batch_dir: manual_batches/2026-06-07__domestic-gas-reservation-scheme-draft-design-framework
  prepared_at_utc: '2026-06-07T17:00:55Z'
