version: 1

review_models:
  - alias: openai_review
    provider: openai
    model: gpt-4.1-mini
    role: review
    enabled: true
    parameters:
      temperature: 0.1
      max_output_tokens: 4000

  - alias: anthropic_review
    provider: anthropic
    model: claude-sonnet-4-20250514
    role: review
    enabled: true
    parameters:
      temperature: 0.1
      max_output_tokens: 4000

  - alias: google_review
    provider: google
    model: gemini-2.5-flash
    role: review
    enabled: true
    parameters:
      temperature: 0.1
      max_output_tokens: 4000

synthesis_models:
  - alias: synthesis_primary
    provider: openai
    model: gpt-4.1-mini
    role: synthesis
    enabled: true
    parameters:
      temperature: 0.1
      max_output_tokens: 5000
