summary: 'Australia''s Online Safety Amendment (Social Media Minimum Age) Act 2024
  amended the Online Safety Act 2021 to require providers of age-restricted social
  media platforms to take reasonable steps to prevent Australian users under 16 from
  having accounts. The bill was introduced in November 2024, passed both Houses on
  29 November 2024, and received assent on 10 December 2024. The policy review should
  focus on the current statutory framework and implementation design for under-16
  account restrictions, including provider obligations, platform scope, age assurance,
  privacy, child safety, enforcement, and proportionality.

  '
