summary: 'The Department of Home Affairs is consulting on proposed Australian Government
  reforms to address drone security risks, with an initial focus on aerial drones.
  The consultation canvasses measures including a national policy framework for drone
  threats, authorised counter-drone capabilities, identification and tracking through
  electronic conspicuity, enforcement settings, operating restrictions for higher-risk
  areas, and public and industry awareness. The consultation is open until 12:00PM
  AEST on 25 May 2026.

  '
