summary: 'The Australian Government is consulting on a draft Design Framework for
  a Domestic Gas Reservation Scheme. The proposal would require LNG exporters to supply
  gas to the Australian domestic market equivalent to 20 per cent of their LNG exports
  each year, described as a domestic supply obligation, with obligations intended
  to commence from 1 July 2027. The framework also canvasses regulatory architecture,
  export approvals, compliance and enforcement arrangements, flexibility mechanisms,
  and related gas market transparency and conduct reforms. Submissions are invited
  until 11:30pm AEST on 30 June 2026.

  '
